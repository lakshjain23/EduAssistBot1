<!DOCTYPE html>
<html>
<head>
<title>EduAssist</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
}

/* Header */
.header {
    background: #667eea;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* Chat container */
.chat-container {
    max-width: 500px;
    margin: 20px auto;
    background: white;
    height: 80vh;
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* Chat area */
#chatlog {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f9fafb;
}

/* Messages */
.message {
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 18px;
    max-width: 75%;
    animation: fadeIn 0.3s ease-in;
}

.user {
    background: #667eea;
    color: white;
    margin-left: auto;
}

.bot {
    background: #e5e7eb;
}

/* Input area */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: white;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    margin-left: 8px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background: #667eea;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}

/* Report button */
#reportBtn {
    background: #ef4444;
    width: 100%;
    border-radius: 0;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="header">EduAssist Chatbot 🤖</div>

<div class="chat-container">

    <div id="chatlog">
        <div class="message bot">Hello! Ask me about fees, exams, syllabus.</div>
    </div>

    <div class="input-area">
        <input id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <button id="reportBtn" style="display:none;" onclick="reportIssue()">Report Incorrect Info</button>

</div>

<script>
const BACKEND_URL = "https://eduassistbot1-2.onrender.com";

async function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.trim();
    if (!msg) return;

    const log = document.getElementById("chatlog");

    log.innerHTML += `<div class="message user">${msg}</div>`;

    log.innerHTML += `<div class="message bot" id="typing">Typing...</div>`;
    log.scrollTop = log.scrollHeight;

    const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    const data = await res.json();

    document.getElementById("typing").remove();

    log.innerHTML += `<div class="message bot">${data.answer}</div>`;
    log.scrollTop = log.scrollHeight;

    input.value = "";
    document.getElementById("reportBtn").style.display = "block";
}

async function reportIssue() {
    await fetch(`${BACKEND_URL}/report`, { method: "POST" });
    alert("Admin notified!");
}

document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
